name: CI Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    services:
      zookeeper:
        image: bitnami/zookeeper:latest
        ports:
          - 2181:2181
        env:
          ALLOW_ANONYMOUS_LOGIN: yes
      kafka:
        image: bitnami/kafka:latest
        ports:
          - 9092:9092
        env:
          KAFKA_CFG_ZOOKEEPER_CONNECT: localhost:2181
          KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://127.0.0.1:9092
          KAFKA_CFG_LISTENERS: PLAINTEXT://0.0.0.0:9092
          ALLOW_PLAINTEXT_LISTENER: yes
          KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
          KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
          KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      postgres:
        image: postgres:14
        ports:
          - 5432:5432
        env:
          POSTGRES_DB: orion
          POSTGRES_USER: admin
          POSTGRES_PASSWORD: admin123
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python 3.9
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-cov flake8

    - name: Lint with flake8
      run: |
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Run unit tests
      run: |
        PYTHONPATH=. pytest tests/unit/ -v --cov=processing --cov=data --cov-report=xml
      env:
        PYTHONPATH: .

    - name: Upload coverage
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false

    # -----------------------------------------
    # Wait for Kafka (Bitnami) to be ready
    # -----------------------------------------
    - name: Wait for Kafka to be ready
      run: |
        echo "Waiting for Kafka on 127.0.0.1:9092..."
        for i in {1..60}; do
          if nc -z 127.0.0.1 9092 2>/dev/null; then
            echo "Kafka port open. Waiting extra 10 seconds for broker metadata..."
            sleep 10
            break
          fi
          echo "Attempt $i: not ready, sleeping 2s"
          sleep 2
        done
        # Final check: create a test topic to confirm
        docker run --rm --network host bitnami/kafka:latest kafka-topics.sh \
          --bootstrap-server 127.0.0.1:9092 \
          --list || exit 1
      if: always()

    - name: Create Kafka topic
      run: |
        docker run --rm --network host bitnami/kafka:latest kafka-topics.sh \
          --create --topic iot-sensor-data \
          --bootstrap-server 127.0.0.1:9092 \
          --partitions 1 --replication-factor 1 || true
      if: always()

    - name: Run integration tests
      run: |
        PYTHONPATH=. pytest tests/integration/ -v
      env:
        PYTHONPATH: .
      continue-on-error: true
